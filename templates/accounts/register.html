{% extends 'base.html' %}

{% block title %}Sign Up - PrintTease{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card slide-up">
        <div class="card-header">
            <i class="fas fa-print" style="font-size: 3rem;"></i>
            <h2 class="mt-3">Create Account</h2>
            <p class="mb-0">Join us for exclusive deals</p>
        </div>
        <div class="card-body">
            <form method="post" action="{% url 'accounts:register' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="username" class="form-label-custom">
                        <i class="fas fa-user me-2"></i>Username
                    </label>
                    <input type="text" name="username" id="username" class="form-control form-control-custom" placeholder="Choose a username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label-custom">
                        <i class="fas fa-envelope me-2"></i>Email Address
                    </label>
                    <input type="email" name="email" id="email" class="form-control form-control-custom" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label-custom">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                    <input type="password" name="password" id="password" class="form-control form-control-custom" placeholder="Create a password" required>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label-custom">
                        <i class="fas fa-lock me-2"></i>Confirm Password
                    </label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control form-control-custom" placeholder="Confirm your password" required>
                </div>

                <div class="mb-4 text-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required style="accent-color: var(--pink-deep);">
                        <label class="form-check-label" for="terms" style="font-size: 0.875rem;">
                            I agree to the <a href="#" style="color: var(--pink-deep);">Terms</a> and <a href="#" style="color: var(--pink-deep);">Privacy Policy</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-pink w-100 py-3">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <p class="text-center mt-4 mb-0" style="color: var(--grey-medium);">
                Already have an account?
                <a href="{% url 'accounts:login' %}" style="color: var(--pink-deep); font-weight: 700; text-decoration: none;">
                    Sign in
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
