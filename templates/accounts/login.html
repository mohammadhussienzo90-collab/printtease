{% extends 'base.html' %}

{% block title %}Login - PrintTease{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card slide-up">
        <div class="card-header">
            <i class="fas fa-print" style="font-size: 3rem;"></i>
            <h2 class="mt-3">Welcome Back</h2>
            <p class="mb-0">Sign in to continue shopping</p>
        </div>
        <div class="card-body">
            <form method="post" action="{% url 'accounts:login' %}">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="username" class="form-label-custom">
                        <i class="fas fa-user me-2"></i>Username
                    </label>
                    <input type="text" name="username" id="username" class="form-control form-control-custom" placeholder="Enter your username" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label-custom">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                    <input type="password" name="password" id="password" class="form-control form-control-custom" placeholder="Enter your password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" style="accent-color: var(--pink-deep);">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" style="color: var(--pink-deep); text-decoration: none; font-weight: 600;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-pink w-100 py-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <p class="text-center mt-4 mb-0" style="color: var(--grey-medium);">
                Don't have an account?
                <a href="{% url 'accounts:register' %}" style="color: var(--pink-deep); font-weight: 700; text-decoration: none;">
                    Sign up now
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
